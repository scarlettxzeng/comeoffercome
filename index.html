<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>comeoffercome</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeece8;
    --text: #1a1a1a; --text2: #6b6b6b; --text3: #a0a0a0;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
    --radius: 8px; --radius-lg: 12px;
    --green-bg: #EAF3DE; --green-text: #27500A;
    --amber-bg: #FAEEDA; --amber-text: #633806;
    --red-bg: #FCEBEB; --red-text: #791F1F;
    --blue-bg: #E6F1FB; --blue-text: #0C447C;
    --gray-bg: #f0ede8; --gray-text: #5a5a5a;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1c; --bg2: #252525; --bg3: #2e2e2e;
      --text: #f0f0f0; --text2: #a0a0a0; --text3: #606060;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
      --green-bg: #1a2e10; --green-text: #9fd470;
      --amber-bg: #2e1f08; --amber-text: #f0b060;
      --red-bg: #2e1010; --red-text: #f08080;
      --blue-bg: #0e1e30; --blue-text: #80b8f0;
      --gray-bg: #2a2a2a; --gray-text: #a0a0a0;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }
  .app { max-width: 1400px; margin: 0 auto; padding: 2rem 1rem; }
  .hdr { margin-bottom: 1.5rem; display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; }
  .hdr h1 { font-size: 22px; font-weight: 600; color: var(--text); }
  .hdr p { font-size: 13px; color: var(--text2); margin-top: 4px; }
  .lang-toggle { flex-shrink: 0; padding: 6px 12px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); font-size: 12px; font-family: inherit; cursor: pointer; }
  .lang-toggle:hover { background: var(--bg2); }
  .top-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .resume-bar { flex: 1; min-width: 260px; display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--bg); border-radius: var(--radius); border: 0.5px solid var(--border); cursor: pointer; transition: background 0.15s; }
  .resume-bar:hover { background: var(--bg2); }
  .resume-bar.loaded { cursor: default; }
  .resume-bar.loaded:hover { background: var(--bg); }
  .resume-bar.drag { background: var(--bg2); }
  .resume-lbl { font-size: 12px; color: var(--text2); white-space: nowrap; flex-shrink: 0; }
  .resume-info { flex: 1; font-size: 13px; color: var(--text3); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .resume-info.loaded { color: var(--text); }
  .key-bar { flex: 1; min-width: 260px; display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(--bg); border-radius: var(--radius); border: 0.5px solid var(--border); }
  .key-bar label { font-size: 12px; color: var(--text2); white-space: nowrap; flex-shrink: 0; }
  .key-bar input { flex: 1; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 5px 10px; font-size: 13px; color: var(--text); background: var(--bg2); min-width: 0; font-family: inherit; }
  .key-bar input:focus { outline: none; border-color: var(--border2); }
  .key-status { font-size: 12px; white-space: nowrap; flex-shrink: 0; }
  .tabs { display: flex; border-bottom: 0.5px solid var(--border); margin-bottom: 1.5rem; gap: 0; }
  .tab { padding: 9px 20px; font-size: 14px; cursor: pointer; border: none; background: none; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -1px; font-family: inherit; transition: color 0.15s; }
  .tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }
  .tab:hover:not(.active) { color: var(--text); }
  .tab-badge { display: inline-block; background: var(--bg2); color: var(--text2); font-size: 11px; padding: 1px 6px; border-radius: 10px; margin-left: 4px; font-weight: 400; }
  .panel { display: none; }
  .panel.active { display: block; }
  .field-label { font-size: 13px; color: var(--text2); margin-bottom: 6px; display: block; }
  textarea { width: 100%; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 12px; font-size: 13px; font-family: inherit; color: var(--text); background: var(--bg); resize: vertical; line-height: 1.6; transition: border-color 0.15s; }
  textarea:focus { outline: none; border-color: var(--border2); }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; font-size: 13px; font-weight: 500; border: 0.5px solid var(--border2); border-radius: var(--radius); cursor: pointer; background: var(--bg); color: var(--text); font-family: inherit; transition: background 0.15s; }
  .btn:hover { background: var(--bg2); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  .btn-primary:hover { opacity: 0.85; background: var(--text); }
  .btn-sm { padding: 4px 12px; font-size: 12px; }
  .btn-danger { border-color: #E24B4A; color: var(--red-text); }
  .btn-danger:hover { background: var(--red-bg); }
  .actions { display: flex; gap: 8px; margin-top: 1rem; flex-wrap: wrap; align-items: center; }
  .rcard { background: var(--bg2); border-radius: var(--radius-lg); padding: 1.25rem; border: 0.5px solid var(--border); margin-top: 1rem; }
  .score-row { display: flex; align-items: center; gap: 16px; margin-bottom: 1rem; }
  .score-circ { width: 70px; height: 70px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; font-weight: 600; }
  .score-num { font-size: 26px; line-height: 1; }
  .score-lbl { font-size: 10px; margin-top: 2px; opacity: 0.8; }
  .sec-title { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.07em; margin: 1rem 0 0.4rem; }
  .rbody { font-size: 14px; line-height: 1.85; color: var(--text); white-space: pre-wrap; }
  .badge { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 500; white-space: nowrap; }
  .bg-green { background: var(--green-bg); color: var(--green-text); }
  .bg-amber { background: var(--amber-bg); color: var(--amber-text); }
  .bg-red { background: var(--red-bg); color: var(--red-text); }
  .bg-gray { background: var(--gray-bg); color: var(--gray-text); }
  .progress { height: 5px; background: var(--border); border-radius: 3px; margin-top: 7px; overflow: hidden; width: 160px; }
  .progress-bar { height: 100%; border-radius: 3px; }
  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hint { font-size: 13px; color: var(--text3); text-align: center; padding: 2.5rem; }
  .opts-row { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 6px; }
  .opts-row label { display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 13px; color: var(--text); }
  .stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.25rem; }
  @media (max-width: 500px) { .stat-row { grid-template-columns: repeat(2, 1fr); } }
  .stat-box { background: var(--bg); border-radius: var(--radius); padding: 12px 16px; border: 0.5px solid var(--border); border-left: 4px solid var(--border2); }
  .stat-blue { border-left-color: var(--blue-text); }
  .stat-purple { border-left-color: #7B61FF; }
  .stat-green { border-left-color: var(--green-text); }
  .stat-orange { border-left-color: #C76A1D; }
  .stat-num { font-size: 28px; font-weight: 600; color: var(--text); }
  .stat-lbl { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .filter-bar { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; padding: 10px 12px; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 0.75rem; }
  .filter-group { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .filter-lbl { font-size: 12px; color: var(--text2); margin-right: 2px; }
  .filter-btn { border: 0.5px solid var(--border); border-radius: 20px; padding: 4px 10px; background: var(--bg2); color: var(--text2); font-size: 12px; font-family: inherit; cursor: pointer; }
  .filter-btn.active { background: var(--text); border-color: var(--text); color: var(--bg); }
  .tbl-wrap { overflow-x: auto; }
  table.tracker { width: 100%; border-collapse: separate; border-spacing: 0 6px; font-size: 13px; min-width: 1020px; }
  table.tracker th { text-align: left; padding: 8px 10px; font-weight: 500; font-size: 11px; color: var(--text2); border-bottom: 0.5px solid var(--border); white-space: nowrap; text-transform: uppercase; letter-spacing: 0.05em; }
  table.tracker td { padding: 12px 10px; border-top: 0.5px solid var(--border); border-bottom: 0.5px solid var(--border); vertical-align: middle; color: var(--text); background: var(--bg); }
  table.tracker tbody tr:not(.detail-row) td:first-child { border-left: 0.5px solid var(--border); border-radius: var(--radius) 0 0 var(--radius); }
  table.tracker tbody tr:not(.detail-row) td:last-child { border-right: 0.5px solid var(--border); border-radius: 0 var(--radius) var(--radius) 0; }
  table.tracker tr:hover td { background: var(--bg2); }
  .tracker-company { font-weight: 600; }
  .tracker-role { font-weight: 500; }
  .score-dot { width: 34px; height: 34px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
  .verdict-badge { padding: 4px 12px; font-size: 12px; }
  .tracker-date { font-size: 12px; color: var(--text3); }
  .link-icon { width: 28px; height: 28px; display: inline-flex; align-items: center; justify-content: center; border: 0.5px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--blue-text); text-decoration: none; font-size: 14px; }
  .link-icon:hover { background: var(--blue-bg); border-color: var(--blue-text); }
  .toggle-switch { position: relative; display: inline-flex; width: 38px; height: 22px; align-items: center; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; inset: 0; cursor: pointer; border-radius: 999px; background: var(--gray-bg); border: 0.5px solid var(--border); transition: background 0.15s; }
  .toggle-slider::before { content: ""; position: absolute; width: 16px; height: 16px; left: 3px; top: 2.5px; border-radius: 50%; background: var(--bg); box-shadow: 0 1px 2px rgba(0,0,0,0.18); transition: transform 0.15s; }
  .toggle-switch input:checked + .toggle-slider { background: var(--green-bg); border-color: var(--green-text); }
  .toggle-switch input:checked + .toggle-slider::before { transform: translateX(16px); }
  .feedback-select { border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 500; border: 0.5px solid transparent; font-family: inherit; cursor: pointer; }
  .fb-gray { background: var(--gray-bg); color: var(--gray-text); border-color: var(--border); }
  .fb-blue { background: var(--blue-bg); color: var(--blue-text); border-color: var(--blue-bg); }
  .fb-purple { background: #EFEAFF; color: #5B3FD6; border-color: #EFEAFF; }
  .fb-green { background: var(--green-bg); color: var(--green-text); border-color: var(--green-bg); }
  .fb-red { background: var(--red-bg); color: var(--red-text); border-color: var(--red-bg); }
  .delete-icon { width: 28px; height: 28px; display: inline-flex; align-items: center; justify-content: center; border: none; border-radius: 50%; background: transparent; color: var(--text3); font-size: 20px; line-height: 1; cursor: pointer; }
  .delete-icon:hover { background: var(--red-bg); color: var(--red-text); }
  .detail-row td { background: var(--bg2); }
  .detail-grid { display: grid; grid-template-columns: repeat(2, minmax(220px, 1fr)); gap: 10px; padding: 4px 0; }
  @media (max-width: 700px) { .detail-grid { grid-template-columns: 1fr; } }
  .detail-box { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 12px; }
  .detail-title { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 5px; }
  .detail-text { font-size: 13px; line-height: 1.7; color: var(--text); white-space: pre-wrap; }
  .job-input-row { display: flex; gap: 16px; padding: 14px 0; border-bottom: 0.5px solid var(--border); align-items: flex-start; }
  .job-input-left { width: 280px; flex-shrink: 0; }
  .job-input-right { flex: 1; min-width: 0; }
  .job-tag { display: inline-block; font-size: 11px; font-weight: 600; color: var(--text2); background: var(--bg2); border: 0.5px solid var(--border); border-radius: 20px; padding: 2px 8px; margin-bottom: 8px; }
  .job-placeholder { height: 25px; margin-bottom: 8px; }
  .job-delete { margin-top: 22px; width: 28px; height: 28px; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; border: none; border-radius: 50%; background: transparent; color: var(--text3); font-size: 20px; cursor: pointer; }
  .job-delete:hover { background: var(--red-bg); color: var(--red-text); }
  .add-job-btn { width: 100%; justify-content: center; border-style: dashed; margin-top: 12px; }
  .analysis-progress { display: none; margin-top: 0.75rem; padding: 10px 12px; background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); font-size: 13px; line-height: 1.7; color: var(--text2); white-space: pre-wrap; }
  .analysis-error { color: var(--red-text); }
  select.inline { border: 0.5px solid var(--border); border-radius: var(--radius); padding: 3px 7px; font-size: 12px; background: var(--bg); color: var(--text); font-family: inherit; }
  input.inline-date { border: 0.5px solid var(--border); border-radius: var(--radius); padding: 3px 7px; font-size: 12px; background: var(--bg); color: var(--text); font-family: inherit; width: 130px; }
  input.inline-note { border: 0.5px solid var(--border); border-radius: var(--radius); padding: 3px 9px; font-size: 12px; background: var(--bg); color: var(--text); font-family: inherit; width: 100%; min-width: 160px; }
  input.inline-url { border: 0.5px solid var(--border); border-radius: var(--radius); padding: 3px 9px; font-size: 12px; background: var(--bg); color: var(--text); font-family: inherit; width: 180px; }
  input[type=text].std { width: 100%; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 7px 10px; font-size: 13px; color: var(--text); background: var(--bg); font-family: inherit; }
  input[type=text].std:focus { outline: none; border-color: var(--border2); }
  input[type=url].std { width: 100%; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 7px 10px; font-size: 13px; color: var(--text); background: var(--bg); font-family: inherit; }
  input[type=url].std:focus { outline: none; border-color: var(--border2); }
  select.std { width: 100%; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 7px 10px; font-size: 13px; color: var(--text); background: var(--bg); font-family: inherit; }
  .two-opt { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 0.75rem; }
  .two-opt > div { flex: 1; min-width: 180px; }
  .footer-credit { font-size: 12px; color: var(--text2); text-align: center; padding: 2rem 0 1rem; }
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div>
      <h1>comeoffercome</h1>
      <p data-i18n="职位分析 · 简历优化 · 面试准备 · 投递追踪">职位分析 · 简历优化 · 面试准备 · 投递追踪</p>
    </div>
    <button class="lang-toggle" onclick="toggleLanguage()">中 / EN</button>
  </div>

  <div class="top-bar">
    <div class="resume-bar" id="resume-bar" onclick="triggerUpload()" ondragover="dragOver(event)" ondragleave="dragLeave()" ondrop="dropResume(event)">
      <span class="resume-lbl" data-i18n="简历">简历</span>
      <span class="resume-info" id="resume-info" data-i18n="未上传，点击或拖入文件（PDF / Word / TXT）">未上传，点击或拖入文件（PDF / Word / TXT）</span>
      <button class="btn btn-sm" id="resume-change-btn" style="display:none;flex-shrink:0" onclick="event.stopPropagation();triggerUpload()" data-i18n="更换">更换</button>
      <input type="file" id="resume-file" accept=".pdf,.docx,.txt" style="display:none" onchange="handleResumeFile(event)">
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('analyze')" data-i18n="职位分析">职位分析</button>
    <button class="tab" onclick="switchTab('resume')" data-i18n="简历优化">简历优化</button>
    <button class="tab" onclick="switchTab('interview')" data-i18n="面试准备">面试准备</button>
    <button class="tab" onclick="switchTab('tracker')"><span data-i18n="投递追踪">投递追踪</span> <span class="tab-badge" id="tracker-badge">0</span></button>
  </div>

  <!-- 职位分析 -->
  <div id="panel-analyze" class="panel active">
    <div id="job-input-list"></div>
    <button class="btn add-job-btn" onclick="addJobInputRow()">+ <span data-i18n="添加职位">添加职位</span></button>
    <div class="actions">
      <button class="btn btn-primary" onclick="analyzeJob()" id="btn-analyze"><span id="ico-analyze" data-i18n="分析匹配度">分析匹配度</span></button>
    </div>
    <div class="analysis-progress" id="analysis-progress"></div>
  </div>

  <!-- 简历优化 -->
  <div id="panel-resume" class="panel">
    <span class="field-label" data-i18n="目标 JD">目标 JD</span>
    <textarea id="jd-r" rows="12" placeholder="粘贴目标岗位 JD..." data-placeholder="粘贴目标岗位 JD..."></textarea>
    <div style="margin-top:0.75rem">
      <span class="field-label" data-i18n="优化侧重">优化侧重</span>
      <div class="opts-row">
        <label><input type="checkbox" id="opt-kw" checked> <span data-i18n="关键词匹配">关键词匹配</span></label>
        <label><input type="checkbox" id="opt-qt"> <span data-i18n="量化成果">量化成果</span></label>
        <label><input type="checkbox" id="opt-st"> <span data-i18n="结构优化">结构优化</span></label>
        <label><input type="checkbox" id="opt-tn"> <span data-i18n="措辞润色">措辞润色</span></label>
      </div>
    </div>
    <div class="actions">
      <button class="btn btn-primary" onclick="optimizeResume()" id="btn-resume"><span id="ico-resume" data-i18n="优化简历">优化简历</span></button>
    </div>
    <div id="result-resume" style="display:none"><div class="rcard" id="content-resume"></div></div>
  </div>

  <!-- 面试准备 -->
  <div id="panel-interview" class="panel">
    <span class="field-label" data-i18n="目标 JD">目标 JD</span>
    <textarea id="jd-i" rows="12" placeholder="粘贴 JD..." data-placeholder="粘贴 JD..."></textarea>
    <div class="actions">
      <button class="btn btn-primary" onclick="genInterview()" id="btn-interview"><span id="ico-interview" data-i18n="生成面试题">生成面试题</span></button>
    </div>
    <div id="result-interview" style="display:none"><div class="rcard" id="content-interview"></div></div>
  </div>

  <!-- 投递追踪 -->
  <div id="panel-tracker" class="panel">
    <div class="stat-row">
      <div class="stat-box stat-blue"><div class="stat-num" id="st-total">0</div><div class="stat-lbl" data-i18n="已分析">已分析</div></div>
      <div class="stat-box stat-purple"><div class="stat-num" id="st-applied">0</div><div class="stat-lbl" data-i18n="已投递">已投递</div></div>
      <div class="stat-box stat-green"><div class="stat-num" id="st-fb">0</div><div class="stat-lbl" data-i18n="收到反馈">收到反馈</div></div>
      <div class="stat-box stat-orange"><div class="stat-num" id="st-rate">—</div><div class="stat-lbl" data-i18n="反馈率">反馈率</div></div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;flex-wrap:wrap;gap:8px">
      <span style="font-size:13px;color:var(--text2)" id="tracker-info"></span>
      <button class="btn btn-sm" onclick="exportCSV()" data-i18n="导出 CSV">导出 CSV</button>
    </div>
    <div class="filter-bar">
      <div class="filter-group" id="applied-filter">
        <span class="filter-lbl" data-i18n="投递状态">投递状态</span>
        <button class="filter-btn active" data-filter-type="applied" data-filter-value="all" onclick="setTrackerFilter('applied','all',this)" data-i18n="全部">全部</button>
        <button class="filter-btn" data-filter-type="applied" data-filter-value="false" onclick="setTrackerFilter('applied','false',this)" data-i18n="未投递">未投递</button>
        <button class="filter-btn" data-filter-type="applied" data-filter-value="true" onclick="setTrackerFilter('applied','true',this)" data-i18n="已投递">已投递</button>
      </div>
      <div class="filter-group" id="feedback-filter">
        <span class="filter-lbl" data-i18n="反馈状态">反馈状态</span>

async function processResume(file) {
  const info=document.getElementById('resume-info');
  info.className='resume-info'; info.textContent=tr('解析中...');
  try {
    let text='';
    if (file.name.endsWith('.txt')) text=await file.text();
    else if (file.name.endsWith('.docx')) {
      const r=await mammoth.extractRawText({arrayBuffer: await file.arrayBuffer()});
      text=r.value;
    } else if (file.name.endsWith('.pdf')) {
      text=await readPdf(file);
    }
    if (!text || text.length<50) { setResumeError('内容太少，请用 TXT 或 DOCX 格式'); return; }
    resumeText=text;
    localStorage.setItem(RESUME_KEY, text);
    localStorage.setItem(RESUME_NAME_KEY, file.name);
    setResumeLoaded(file.name+' · '+Math.round(text.length/100)/10+'k 字符');
  } catch(e) { setResumeError('解析失败，请用 TXT 或 DOCX 格式'); }
}

  el.className='resume-info'; el.style.color='var(--red-text)'; el.textContent=tr(msg);
}

async function readPdf(file) {
  return new Promise(resolve => {
    const r=new FileReader();
    r.onload=e => {
      let t=''; const raw=e.target.result;
      for (let i=0;i<raw.length;i++) {
        const c=raw.charCodeAt(i);
        if ((c>=32&&c<=126)||(c>=0x4e00&&c<=0x9fff)||c===10) t+=raw[i];
      }
      resolve(t.length>100 ? t : tr('请改用 TXT 或 DOCX 格式上传'));
    };
    r.readAsBinaryString(file);
  });
}

async function analyzeJob() {
  if (!checkReady()) return;
  syncJobInputRows();
  const jobs=jobInputRows.map((row,index)=>({...row,index})).filter(row=>row.jd.trim());
  if (!jobs.length) { alert(tr('请填写 JD')); return; }
  if (jobs.some(row=>!row.url.trim())) { alert(tr('请填写职位链接')); return; }

  progress.style.display='block';

    progress.innerHTML+=currentLang==='en' ? `Analyzing ${i+1} / ${jobs.length}...\n` : `正在分析第 ${i+1} / ${jobs.length} 个...\n`;
    try {
      const result=await callAPI(getAnalyzePrompt(), `我的简历：\n${resumeText}\n\n目标JD：\n${jobs[i].jd}`);
      const info=parseAnalysisSummary(result);
      trackerData.unshift(createTrackerEntry(info, jobs[i].url.trim()));
      saveTracker(); updateBadge();
      added++;
    } catch(e) {
      progress.innerHTML+=currentLang==='en' ? `<span class="analysis-error">Item ${i+1} failed: ${escapeHtml(e.message)}</span>\n` : `<span class="analysis-error">第 ${i+1} 个分析失败：${escapeHtml(e.message)}</span>\n`;
    }
  }
  progress.innerHTML+=currentLang==='en' ? `Analysis complete. Added ${added} records.` : `分析完成，共添加 ${added} 条记录`;
  setLoading('btn-analyze','ico-analyze',false,'分析匹配度');

function renderAnalysis(text, container) {
  const g=pat => { const m=text.match(pat); return m?m[1].trim():''; };
  const company=g(/【公司名】(.+)/), role=g(/【职位名】(.+)/), orient=g(/【岗位偏向】(.+)/);
  const score=parseInt(g(/【总体评分】(\d+)/))||null;
  const verdict=g(/【推荐结论】(.+)/), reason=g(/【一句话理由】(.+)/);
  const sc=score>=70?'var(--green-text)':score>=50?'var(--amber-text)':'var(--red-text)';
  const sbg=score>=70?'var(--green-bg)':score>=50?'var(--amber-bg)':'var(--red-bg)';
  const vb=verdict==='投递'?'bg-green':verdict==='谨慎投递'?'bg-amber':'bg-red';
  let html='';
  if (score) {
    html+=`<div class="score-row">
      <div class="score-circ" style="background:${sbg};color:${sc}">
        <span class="score-num">${score}</span><span class="score-lbl">${tr('匹配分')}</span>
      </div>
      <div>
        <div style="font-size:14px;font-weight:500;margin-bottom:6px">${company} · ${role}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px">
          <span class="badge ${vb}">${tv(verdict)}</span>
          <span class="badge bg-gray">${tv(orient)}</span>
        </div>
        <div style="font-size:13px;color:var(--text2)">${reason}</div>
        <div class="progress"><div class="progress-bar" style="width:${score}%;background:${sc}"></div></div>
      </div>
    </div>`;
  }
  for (const [k,l] of [['公司背景','公司背景'],['岗位亮点','岗位亮点']]) {
    const m=text.match(new RegExp(`【${k}】([\\s\\S]*?)(?=【|$)`));
    if (m) html+=`<div class="sec-title" data-dyn-i18n="${l}">${tr(l)}</div><div class="rbody">${m[1].trim()}</div>`;
  }
  for (const [k,l] of [['匹配优势','匹配优势'],['主要差距','主要差距'],['投递建议','投递建议']]) {
    const m=text.match(new RegExp(`【${k}】([\\s\\S]*?)(?=【|$)`));
    if (m) html+=`<div class="sec-title" data-dyn-i18n="${l}">${tr(l)}</div><div class="rbody">${m[1].trim()}</div>`;
  }
  container.innerHTML=html||`<div class="rbody">${text}</div>`;
}

function parseAnalysisSummary(t) {
  const g=pat => { const m=t.match(pat); return m?m[1].trim():''; };
  const section=name => t.match(new RegExp(`【${name}】([\\s\\S]*?)(?=【|$)`))?.[1]?.trim()||'';
  return {
    company: g(/【公司名】(.+)/)||'未知',
    role: g(/【职位名】(.+)/)||'未知',
    orient: g(/【岗位偏向】(.+)/)||'—',
    score: parseInt(g(/【总体评分】(\d+)/))||0,
    verdict: g(/【推荐结论】(.+)/),
    companyBg: section('公司背景'),
    highlights: section('岗位亮点'),
    pros: section('匹配优势'),
    cons: section('主要差距')
  };
}

}

  try {
    const result=await callAPI(sys, `简历：\n${resumeText}\n\nJD：\n${jd}`);
    renderSections(result, content, [['岗位关键能力','关键能力'],['高频行为问题','高频行为题'],['专业问题','专业问题'],['反问面试官','反问建议']], false);
  } catch(e) { content.innerHTML=`<div style="font-size:13px;color:var(--red-text)">请求失败：${e.message}</div>`; }
  setLoading('btn-interview','ico-interview',false,'重新生成');
}

function renderSections(text, container, sections, hasResumeCopy) {
  let html='';
  for (const [k,l] of sections) {
    const m=text.match(new RegExp(`【${k}】([\\s\\S]*?)(?=【|$)`));
    if (m) {
      html+=`<div class="sec-title" data-dyn-i18n="${l}">${tr(l)}</div>`;
      if (k==='优化后简历' && hasResumeCopy) {
        html+=`<div class="rbody" style="background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:8px">${m[1].trim()}</div>`;
        html+=`<button class="btn btn-sm" data-dyn-i18n="复制简历" onclick="copyTxt(this,${JSON.stringify(m[1].trim())})">${tr('复制简历')}</button>`;
      } else {
        html+=`<div class="rbody">${m[1].trim()}</div>`;
      }
    }
  }
  container.innerHTML=html||`<div class="rbody">${text}</div>`;
}

function copyTxt(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    const o=btn.textContent; btn.textContent=tr('已复制');
    setTimeout(()=>btn.textContent=o, 2000);
  });
}

function renderTracker() {
  const body=document.getElementById('tracker-body');
  const total=trackerData.length;
  const visibleData=trackerData.filter(d => {
    const appliedOk=trackerFilters.applied==='all' || String(!!d.applied)===trackerFilters.applied;
    const feedbackOk=trackerFilters.feedback==='all' || d.feedback===trackerFilters.feedback;
    return appliedOk && feedbackOk;
  });
  const applied=trackerData.filter(d=>d.applied).length;
  const fb=trackerData.filter(d=>d.feedback!=='待定'&&d.feedback!=='').length;
  document.getElementById('st-total').textContent=total;
  document.getElementById('st-applied').textContent=applied;
  document.getElementById('st-fb').textContent=fb;
  document.getElementById('st-rate').textContent=applied?Math.round(fb/applied*100)+'%':'—';
  document.getElementById('tracker-info').textContent=total?(currentLang==='en'?`${total} records, showing ${visibleData.length}`:`共 ${total} 条记录，当前显示 ${visibleData.length} 条`):'';
  if (!total) { body.innerHTML=''; document.getElementById('tracker-empty').textContent=tr('暂无记录，请先分析职位'); document.getElementById('tracker-empty').style.display='block'; return; }
  if (!visibleData.length) { body.innerHTML=''; document.getElementById('tracker-empty').style.display='block'; document.getElementById('tracker-empty').textContent=currentLang==='en'?'No records match the current filters':'没有符合筛选条件的记录'; return; }
  document.getElementById('tracker-empty').style.display='none';
  document.getElementById('tracker-empty').textContent=tr('暂无记录，请先分析职位');
  body.innerHTML=visibleData.map((d,i) => {
    const sc=d.score>=70?'var(--green-text)':d.score>=50?'var(--amber-text)':'var(--red-text)';
    const sbg=d.score>=70?'var(--green-bg)':d.score>=50?'var(--amber-bg)':'var(--red-bg)';
    const vb=d.verdict==='投递'?'bg-green':d.verdict==='谨慎投递'?'bg-amber':'bg-red';
    const fbClass=getFeedbackClass(d.feedback);
    const detailOpen=!!trackerDetailsOpen[d.id];
    const detailHtml=detailOpen ? `<tr class="detail-row"><td colspan="13">
      <div class="detail-grid">
        ${renderTrackerDetail(tr('公司背景'), d.companyBg)}
        ${renderTrackerDetail(tr('岗位亮点'), d.highlights)}
        ${renderTrackerDetail(tr('匹配优势'), d.pros)}
        ${renderTrackerDetail(tr('主要差距'), d.cons)}
      </div>
    </td></tr>` : '';
    return `<tr>
      <td style="color:var(--text2);font-size:12px">${visibleData.length-i}</td>
      <td class="tracker-company">${d.company}</td>
      <td class="tracker-role">${d.role}</td>
      <td><span class="badge bg-gray">${tv(d.orient)}</span></td>
      <td><span class="score-dot" style="background:${sbg};color:${sc}">${d.score}</span></td>
      <td><span class="badge verdict-badge ${vb}">${tv(d.verdict)}</span></td>
      <td class="tracker-date">${d.analyzedAt}</td>
      <td style="min-width:160px">
        ${d.url ? `<a class="link-icon" href="${escapeHtml(d.url)}" target="_blank" title="${escapeHtml(d.url)}">🔗</a>` : `<input class="inline-url" type="text" placeholder="${tr('粘贴职位页面链接...')}" onchange="updateField(${d.id},'url',this.value)">`}
      </td>
      <td><label class="toggle-switch" title="${d.applied?tr('已投递'):tr('未投递')}">
        <input type="checkbox" ${d.applied?'checked':''} onchange="updateField(${d.id},'applied',this.checked)">
        <span class="toggle-slider"></span>
      </label></td>
      <td><input class="inline-date" type="date" value="${d.appliedAt}" onchange="updateField(${d.id},'appliedAt',this.value)"></td>
      <td><select class="feedback-select ${fbClass}" onchange="updateField(${d.id},'feedback',this.value)">
        ${renderFeedbackOption('待定', d.feedback)}
        ${renderFeedbackOption('已查看', d.feedback)}
        ${renderFeedbackOption('已笔试', d.feedback)}
        ${renderFeedbackOption('已面试', d.feedback)}
        ${renderFeedbackOption('已offer', d.feedback)}
        ${renderFeedbackOption('已拒绝', d.feedback)}
        ${renderFeedbackOption('已撤回', d.feedback)}
      </select></td>
      <td><input class="inline-note" type="text" value="${escapeHtml(d.note)}" placeholder="${tr('备注')}" onchange="updateField(${d.id},'note',this.value)"></td>
      <td><div style="display:flex;gap:6px;align-items:center">
        <button class="btn btn-sm" onclick="toggleTrackerDetails(${d.id})">${detailOpen?tr('收起'):tr('详情')}</button>
        <button class="delete-icon" onclick="deleteEntry(${d.id})" title="${tr('删除')}">×</button>
      </div></td>
    </tr>${detailHtml}`;
  }).join('');
}

function renderFeedbackOption(value, current) {
  return `<option value="${value}" ${current===value?'selected':''}>${tr(value)}</option>`;
}

function getFeedbackClass(feedback) {
  if (feedback==='已查看' || feedback==='已笔试') return 'fb-blue';
  if (feedback==='已面试') return 'fb-purple';
  if (feedback==='已offer') return 'fb-green';
  if (feedback==='已拒绝') return 'fb-red';
  return 'fb-gray';
}

function escapeHtml(value) {
  return String(value||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderTrackerDetail(title, text) {
  return `<div class="detail-box"><div class="detail-title">${title}</div><div class="detail-text">${escapeHtml(text)||tr('暂无')}</div></div>`;
}

function toggleTrackerDetails(id) {
  trackerDetailsOpen[id]=!trackerDetailsOpen[id];
  renderTracker();
}

function setTrackerFilter(type, value, btn) {
  trackerFilters[type]=value;
  document.querySelectorAll(`.filter-btn[data-filter-type="${type}"]`).forEach(el=>el.classList.toggle('active', el===btn));
  renderTracker();
}

function updateField(id, field, value) {
  const e=trackerData.find(d=>d.id===id);
  if (e) { e[field]=value; saveTracker(); }
  const applied=trackerData.filter(d=>d.applied).length;
  const fb=trackerData.filter(d=>d.feedback!=='待定'&&d.feedback!=='').length;
  document.getElementById('st-applied').textContent=applied;
  document.getElementById('st-fb').textContent=fb;
  document.getElementById('st-rate').textContent=applied?Math.round(fb/applied*100)+'%':'—';
  if (field==='applied' || field==='feedback') renderTracker();
}

function deleteEntry(id) {
  if (!confirm(tr('确认删除？'))) return;
  trackerData=trackerData.filter(d=>d.id!==id);
  saveTracker(); updateBadge(); renderTracker();
}

function saveTracker() { try { localStorage.setItem(TRACKER_KEY, JSON.stringify(trackerData)); } catch(e) {} }
function updateBadge() { document.getElementById('tracker-badge').textContent=trackerData.length; }

function exportCSV() {
  if (!trackerData.length) { alert(tr('暂无数据')); return; }
  const h=['公司','职位','岗位偏向','匹配分','结论','分析时间','职位链接','公司背景','岗位亮点','匹配优势','主要差距','是否投递','投递时间','反馈状态','备注'];
  const rows=trackerData.map(d=>[d.company,d.role,d.orient,d.score,d.verdict,d.analyzedAt,d.url||'',d.companyBg||'',d.highlights||'',d.pros||'',d.cons||'',d.applied?'是':'否',d.appliedAt,d.feedback,d.note].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(','));
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+h.join(',')+'\n'+rows.join('\n')], {type:'text/csv;charset=utf-8'}));
  a.download='求职追踪.csv'; a.click();
}

init();
</script>
